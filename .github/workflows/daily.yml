name: Mobile Automation Email

on:
  repository_dispatch:
    types: [mobile_trigger]
  workflow_dispatch: # This enables the manual button

jobs:
  send_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run automation script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          VIDEO_URL: ${{ github.event.client_payload.video_url || 'No URL' }}
          USER_MESSAGE: ${{ github.event.client_payload.message || 'Manual test' }}
        run: python main.py
